<h1>Contact</h1>
<form action="mailto:dinostroza@ucsd.edu" method="POST" enctype="text/plain">
    <label>
        <span>Email:</span>
        <input type="email" name="email" required>
    </label>
    
    <label>
        <span>Subject:</span>
        <input name="subject" required>
